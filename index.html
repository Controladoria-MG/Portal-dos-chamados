<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal de Chamados</title>
  <link rel="stylesheet" href="static/style.css" />
  <!-- SheetJS: leitura de .xlsx no browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="topbar">
    <img src="data/imagens/logo.png" alt="MG Controle" class="topbar-logo" />
    <div class="topbar-info">
      <h1 class="topbar-title">Relatório dos chamados - MG Controle</h1>
      <div class="topbar-meta">
        <span class="topbar-atualizacao" id="header-date"></span>
        <span class="topbar-meta-sep">|</span>
        <span class="topbar-hint">Para atualizar seus dados recarregue a página usando "Ctrl+Shift+F5"</span>
      </div>
    </div>
    <button id="theme-toggle">Alterar tema</button>
  </header>

  <!-- BARRA DE NAVEGAÇÃO -->
  <div class="unidade-bar" id="unidade-bar" style="display:none">
    <span class="unidade-crumb" id="bc-home">Início</span>
    <span class="unidade-sep" id="bc-sep">›</span>
    <span class="unidade-nome" id="bc-dept"></span>
  </div>

  <main>

    <!-- ── HOME VIEW ─────────────────────────────────────── -->
    <div id="view-home" class="view active">

      <div class="page-title">
        <h1>Painel de Controle</h1>
      </div>

      <!-- Loading -->
      <div id="loading">
        <div class="spinner"></div>
        <p>Carregando base de dados...</p>
      </div>

      <!-- Error -->
      <div id="error-msg"></div>

      <!-- Department cards -->
      <div id="dept-grid"></div>

    </div><!-- /view-home -->

    <!-- ── DEPT VIEW ──────────────────────────────────────── -->
    <div id="view-dept" class="view">

      <button class="btn-back" id="btn-back">← Voltar</button>

      <!-- Abas Pendentes / Retornados (visível só para GC) -->
      <div id="dept-tabs"></div>

      <!-- Client table -->
      <div class="table-wrap">
        <div class="table-header">
          <div>
            <div class="table-title">Chamados por cliente</div>
            <div class="table-subtitle">Clique na linha para ver mais detalhes</div>
          </div>
          <input
            class="search-input"
            id="client-search"
            type="search"
            placeholder="Buscar cliente..."
          />
        </div>

        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>ID Cliente</th>
                <th>Cliente</th>
                <th>Data Cadastro</th>
                <th>Prazo Vencimento</th>
              </tr>
            </thead>
            <tbody id="client-body"></tbody>
          </table>
        </div>
      </div>

    </div><!-- /view-dept -->

  </main>

  <script src="static/script.js"></script>
</body>
</html>
